<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pokemon Tile Generator & Exporter</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; }
        .tile-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .tile-card { background: #333; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        canvas { image-rendering: pixelated; background: #000; display: block; margin: 10px auto; border: 1px solid #555; }
        button { background: #ff5555; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold;}
        button:hover { background: #ff3333; }
        .download-all { background: #4caf50; padding: 12px 24px; font-size: 16px; margin-bottom: 20px; display: block; cursor: pointer; border: none; color: white; border-radius: 6px; font-weight: bold;}
        .download-all:hover { background: #45a049; }
    </style>
</head>
<body>

    <h1>Pokémon 2D Tile Exporter (32x32px)</h1>
    <p>Gaya Pixel Art Natural. Klik tombol di bawah untuk mengunduh semua asset sekaligus ke folder proyek Java-mu.</p>
    
    <button class="download-all" onclick="downloadAllTiles()">↓ UNDUH SEMUA TILE (PNG)</button>

    <div class="tile-container" id="container"></div>

<script>
const TILE_SIZE = 32;

// Daftar spesifikasi Tile sesuai ID di kode Java-mu
const tileSpecs = [
    { id: 0, name: "grass.png", draw: drawGrass },
    { id: 1, name: "wall.png", draw: drawWall },
    { id: 2, name: "tallgrass.png", draw: drawTallGrass },
    { id: 3, name: "water.png", draw: drawWater },
    { id: 4, name: "dirt.png", draw: drawDirt },
    { id: 5, name: "sand.png", draw: drawSand },
    { id: 6, name: "flowers.png", draw: drawFlowers },
    { id: 7, name: "signpost.png", draw: drawSignpost },
    { id: 8, name: "tree_bot_left.png", draw: drawTreeBotLeft },
    { id: 9, name: "tree_bot_right.png", draw: drawTreeBotRight },
    { id: 12, name: "tree_top_left.png", draw: drawTreeTopLeft },
    { id: 13, name: "tree_top_right.png", draw: drawTreeTopRight },
    { id: 14, name: "tree_mid_left.png", draw: drawTreeMidLeft },
    { id: 15, name: "tree_mid_right.png", draw: drawTreeMidRight }
];

// --- FUNGSI DRAW PIXEL ART ---

function drawGrass(ctx) {
    ctx.fillStyle = "#55b042"; ctx.fillRect(0, 0, 32, 32);
    ctx.fillStyle = "#4da23a";
    // Tekstur rumput halus acak
    ctx.fillRect(4, 6, 2, 2); ctx.fillRect(18, 4, 2, 2); ctx.fillRect(26, 12, 2, 2);
    ctx.fillRect(8, 20, 2, 2); ctx.fillRect(20, 24, 2, 2); ctx.fillRect(2, 28, 2, 2);
    ctx.fillStyle = "#61c34d"; // Highlight rumput terang
    ctx.fillRect(6, 4, 2, 2); ctx.fillRect(16, 22, 2, 2); ctx.fillRect(24, 26, 2, 2);
}

function drawWall(ctx) {
    // Tembok Bata Merah Bata khas Pokemon Kanto
    ctx.fillStyle = "#703018"; ctx.fillRect(0, 0, 32, 32);
    ctx.fillStyle = "#8c4020"; // Lapisan bata utama
    for(let y=0; y<32; y+=8) {
        let offset = (y % 16 === 0) ? 0 : 8;
        for(let x=0; x<32; x+=16) {
            ctx.fillRect(x + offset + 1, y + 1, 14, 6);
        }
    }
    // Garis semen/mortar & bayangan pembatas
    ctx.fillStyle = "#4a1c0d";
    for(let y=7; y<32; y+=8) ctx.fillRect(0, y, 32, 1);
    for(let y=0; y<32; y+=8) {
        let offset = (y % 16 === 0) ? 0 : 8;
        ctx.fillRect(offset, y, 1, 8);
        ctx.fillRect(offset + 15, y, 1, 8);
    }
    // Highlight bata teratas biar 3D
    ctx.fillStyle = "#b05830";
    ctx.fillRect(1, 1, 14, 1); ctx.fillRect(17, 9, 14, 1);
}

function drawTallGrass(ctx) {
    drawGrass(ctx); // Base rumput biasa
    ctx.fillStyle = "#388226"; // Bayangan semak dalam
    ctx.fillRect(4, 12, 8, 16); ctx.fillRect(18, 8, 10, 20);
    
    ctx.fillStyle = "#2a661c"; // Tekstur daun dalam berlapis
    // Menggambar helai rumput tajam melengkung ke atas
    let blades = [[4,24], [8,16], [12,20], [18,22], [22,12], [26,18]];
    blades.forEach(([bx, by]) => {
        ctx.fillRect(bx, by, 4, 8);
        ctx.fillRect(bx+2, by-4, 2, 6);
    });
    ctx.fillStyle = "#7ede59"; // Highlight ujung daun atas
    blades.forEach(([bx, by]) => ctx.fillRect(bx+2, by-4, 2, 2));
}

function drawWater(ctx) {
    ctx.fillStyle = "#357ab8"; ctx.fillRect(0, 0, 32, 32);
    // Riak gelombang air
    ctx.fillStyle = "#275e91"; // Bayangan dalam air
    ctx.fillRect(2, 6, 12, 2); ctx.fillRect(18, 14, 10, 2); ctx.fillRect(6, 24, 14, 2);
    
    ctx.fillStyle = "#5ca5e6"; // Riak cahaya pantulan air
    ctx.fillRect(4, 4, 8, 2); ctx.fillRect(20, 12, 6, 2); ctx.fillRect(8, 22, 10, 2);
    ctx.fillStyle = "#ffffff"; // Titik kilau air (glint)
    ctx.fillRect(6, 4, 2, 2); ctx.fillRect(22, 12, 2, 2);
}

function drawDirt(ctx) {
    ctx.fillStyle = "#b88c5c"; ctx.fillRect(0, 0, 32, 32);
    ctx.fillStyle = "#966e43"; // Tekstur tanah/kerikil gelap
    ctx.fillRect(4, 4, 2, 2); ctx.fillRect(18, 8, 2, 1); ctx.fillRect(12, 18, 1, 2);
    ctx.fillRect(26, 22, 2, 2); ctx.fillRect(8, 26, 2, 2);
    ctx.fillStyle = "#cc9f6d"; // Pasir/tanah terang terinjak
    ctx.fillRect(14, 6, 2, 2); ctx.fillRect(2, 14, 2, 2); ctx.fillRect(22, 16, 2, 2);
}

function drawSand(ctx) {
    ctx.fillStyle = "#e6ce95"; ctx.fillRect(0, 0, 32, 32);
    ctx.fillStyle = "#cca96a"; // Kontur guratan angin pada pasir
    ctx.fillRect(0, 8, 8, 1); ctx.fillRect(16, 4, 12, 1);
    ctx.fillRect(6, 20, 14, 1); ctx.fillRect(22, 26, 10, 1);
    // Titik bintik pasir emas
    ctx.fillStyle = "#fff0b8";
    ctx.fillRect(4, 12, 1, 1); ctx.fillRect(26, 10, 1, 1); ctx.fillRect(12, 28, 1, 1);
}

function drawFlowers(ctx) {
    drawGrass(ctx); // Base rumput biasa
    // Menggambar 3 bunga (Merah & Kuning)
    // Bunga 1 (Merah)
    ctx.fillStyle = "#d12828"; ctx.fillRect(6, 8, 4, 4);
    ctx.fillStyle = "#f5db2c"; ctx.fillRect(7, 9, 2, 2); // Center
    // Bunga 2 (Kuning)
    ctx.fillStyle = "#f5db2c"; ctx.fillRect(20, 6, 4, 4);
    ctx.fillStyle = "#ffffff"; ctx.fillRect(21, 7, 2, 2); // Center
    // Bunga 3 (Merah kecil)
    ctx.fillStyle = "#d12828"; ctx.fillRect(14, 22, 4, 4);
    ctx.fillStyle = "#f5db2c"; ctx.fillRect(15, 23, 2, 2);
}

function drawSignpost(ctx) {
    drawGrass(ctx); // diletakkan di atas rumput
    // Tiang kayu kayu
    ctx.fillStyle = "#4a2406"; ctx.fillRect(14, 16, 4, 16);
    // Papan Kayu
    ctx.fillStyle = "#8a4f1e"; ctx.fillRect(4, 4, 24, 12);
    // Pinggiran Kayu Tua & Bayangan bawah papan
    ctx.fillStyle = "#4a2406";
    ctx.fillRect(4, 4, 24, 1); ctx.fillRect(4, 15, 24, 1);
    ctx.fillRect(4, 4, 1, 12); ctx.fillRect(27, 4, 1, 12);
    // Serat tulisan kayu fiktif
    ctx.fillStyle = "#ba7a45"; ctx.fillRect(7, 7, 18, 2); ctx.fillRect(9, 11, 14, 2);
}

// --- LOGIK BLOK POHON BESAR (32x32 per potongan, total 64x96px) ---
const POHON_HIJAU_TUA = "#1d5221";
const POHON_HIJAU_MID = "#2e7d32";
const POHON_HIJAU_LIGHT = "#4caf50";
const POHON_BATANG = "#5d4037";
const POHON_BATANG_DARK = "#3e2723";

function drawTreeTopLeft(ctx) {
    drawGrass(ctx); // Background transparan daun ke rumput
    ctx.fillStyle = POHON_HIJAU_TUA; ctx.fillRect(12, 12, 20, 20); // Base shadow
    ctx.fillStyle = POHON_HIJAU_MID; ctx.fillRect(16, 16, 16, 16);
    // Lengkungan daun rimbun bulat khas pokemon
    ctx.beginPath(); ctx.arc(32, 32, 20, 0, Math.PI*2); ctx.fillStyle = POHON_HIJAU_MID; ctx.fill();
    ctx.beginPath(); ctx.arc(28, 28, 14, 0, Math.PI*2); ctx.fillStyle = POHON_HIJAU_LIGHT; ctx.fill();
}

function drawTreeTopRight(ctx) {
    drawGrass(ctx);
    ctx.fillStyle = POHON_HIJAU_TUA; ctx.fillRect(0, 12, 20, 20);
    ctx.beginPath(); ctx.arc(0, 32, 20, 0, Math.PI*2); ctx.fillStyle = POHON_HIJAU_MID; ctx.fill();
    ctx.beginPath(); ctx.arc(4, 28, 14, 0, Math.PI*2); ctx.fillStyle = POHON_HIJAU_LIGHT; ctx.fill();
}

function drawTreeMidLeft(ctx) {
    drawGrass(ctx);
    // Daun bagian tengah melingkar keluar mendatar
    ctx.fillStyle = POHON_HIJAU_TUA; ctx.fillRect(4, 0, 28, 32);
    ctx.fillStyle = POHON_HIJAU_MID; ctx.fillRect(8, 2, 24, 28);
    // Detail shading gundukan daun samping
    ctx.beginPath(); ctx.arc(24, 16, 16, 0, Math.PI*2); ctx.fillStyle = POHON_HIJAU_LIGHT; ctx.fill();
    ctx.beginPath(); ctx.arc(12, 16, 10, 0, Math.PI*2); ctx.fillStyle = POHON_HIJAU_MID; ctx.fill();
}

function drawTreeMidRight(ctx) {
    drawGrass(ctx);
    ctx.fillStyle = POHON_HIJAU_TUA; ctx.fillRect(0, 0, 28, 32);
    ctx.fillStyle = POHON_HIJAU_MID; ctx.fillRect(0, 2, 24, 28);
    ctx.beginPath(); ctx.arc(8, 16, 16, 0, Math.PI*2); ctx.fillStyle = POHON_HIJAU_LIGHT; ctx.fill();
}

function drawTreeBotLeft(ctx) {
    drawGrass(ctx);
    // Batang pohon sebelah kiri
    ctx.fillStyle = POHON_BATANG_DARK; ctx.fillRect(20, 0, 12, 24);
    ctx.fillStyle = POHON_BATANG; ctx.fillRect(26, 0, 6, 24);
    // Akar menyamping kiri bawah
    ctx.fillRect(14, 18, 12, 6);
    ctx.fillStyle = POHON_BATANG_DARK; ctx.fillRect(14, 24, 10, 4);
    // Sisa dedaunan menggelantung dari atas
    ctx.fillStyle = POHON_HIJAU_TUA; ctx.fillRect(4, 0, 28, 10);
    ctx.beginPath(); ctx.arc(12, 0, 12, 0, Math.PI); ctx.fillStyle = POHON_HIJAU_TUA; ctx.fill();
}

function drawTreeBotRight(ctx) {
    drawGrass(ctx);
    // Batang pohon sebelah kanan
    ctx.fillStyle = POHON_BATANG_DARK; ctx.fillRect(0, 0, 12, 24);
    ctx.fillStyle = POHON_BATANG; ctx.fillRect(0, 0, 8, 24);
    // Akar menyamping kanan bawah
    ctx.fillRect(6, 18, 12, 6);
    ctx.fillStyle = POHON_BATANG_DARK; ctx.fillRect(8, 24, 10, 4);
    // Sisa dedaunan menggantung
    ctx.fillStyle = POHON_HIJAU_TUA; ctx.fillRect(0, 0, 28, 10);
    ctx.beginPath(); ctx.arc(20, 0, 12, 0, Math.PI); ctx.fillStyle = POHON_HIJAU_TUA; ctx.fill();
}

// --- SETUP INJECTOR KE HALAMAN HTML ---
const container = document.getElementById('container');

tileSpecs.forEach(spec => {
    let card = document.createElement('div');
    card.className = 'tile-card';
    
    let title = document.createElement('h3');
    title.innerText = `ID ${spec.id}\n${spec.name}`;
    title.style.fontSize = '12px';
    
    let canvas = document.createElement('canvas');
    canvas.width = TILE_SIZE;
    canvas.height = TILE_SIZE;
    canvas.style.width = (TILE_SIZE * 3) + "px"; // Diperbesar 3x di preview agar mudah dilihat
    canvas.style.height = (TILE_SIZE * 3) + "px";
    
    let ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    spec.draw(ctx);
    
    let btn = document.createElement('button');
    btn.innerText = "Download";
    btn.onclick = () => downloadCanvas(canvas, spec.name);
    
    card.appendChild(title);
    card.appendChild(canvas);
    card.appendChild(btn);
    container.appendChild(card);
    
    // Simpan ref canvas di spesifikasi untuk fungsi download massal
    spec.canvasRef = canvas;
});

function downloadCanvas(canvas, filename) {
    let link = document.createElement('a');
    link.download = filename;
    link.href = canvas.toDataURL("image/png");
    link.click();
}

function downloadAllTiles() {
    let delay = 0;
    tileSpecs.forEach(spec => {
        setTimeout(() => {
            downloadCanvas(spec.canvasRef, spec.name);
        }, delay);
        delay += 250; // Jeda 250ms antar unduhan agar browser tidak memblokir multiple download
    });
}
</script>
</body>
</html>
